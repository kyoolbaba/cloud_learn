# nginx-reverse-proxy.conf — put nginx in front of your app (Module 1, Lab 8).
#
# Why a reverse proxy? Production never exposes the app port (8011) directly.
# nginx sits on :80/:443, handles TLS, compression, static files, rate limits,
# and forwards real requests to the app on localhost:8011. The app only listens
# on localhost, so it can't be hit directly from outside.
#
# Install & use (in WSL Ubuntu):
#   sudo apt install -y nginx
#   sudo cp nginx-reverse-proxy.conf /etc/nginx/sites-available/forecast
#   sudo ln -sf /etc/nginx/sites-available/forecast /etc/nginx/sites-enabled/forecast
#   sudo rm -f /etc/nginx/sites-enabled/default      # remove the default site
#   sudo nginx -t                                    # test config syntax
#   sudo service nginx restart
# Then start your app on 8011 and hit http://localhost/  (port 80, no :8011).

upstream forecast_app {
    server 127.0.0.1:8011;          # where your FastAPI/uvicorn app listens
}

server {
    listen 80;
    server_name localhost;

    # Forward everything to the app
    location / {
        proxy_pass         http://forecast_app;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket / SSE support (for live progress streaming later)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 3600s;       # long-lived connections for progress streams
    }

    # Example: serve static files directly from nginx (faster than the app)
    # location /static/ {
    #     alias /var/www/forecast/static/;
    # }
}
